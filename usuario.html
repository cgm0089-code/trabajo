<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1> Área de Usuario </h1>
    <!--Aqui se va a registrar el usuario-->
    <section class="seccion" id="registro">

        <form id="formulario-registro">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            
            <label for="confirm_password">Confirmar Contraseña:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>  

            <button type="submit">Registrarse</button>
         </form>
    </section>

    <!--Aqui se va a hacer el login-->
    <section class="seccion" id="login">
        <form id="formulario-login">
            <label for="email_login">Email:</label>
            <input type="email" id="email_login" name="email_login" required>

            <label for="password_login">Contraseña:</label>
            <input type="password" id="password_login" name="password_login" required>

            <button type="submit">Iniciar Sesión</button>
        </form>
    </section>

    <!-- Aqui se va a crear un área privada-->
    <section class="seccion" id="area-privada" style="display:none;">
        <h2> Mi Área Personal</h2>
        <p> <strong>Bienvenido/a,<span id="nombreUsuario"></span></strong></p>
        
        <h3> Modificar datos personales</h3>
        <form id="formModificar">
            <label>Email</label>
            <input type="email" id="modEmail">

            <label>Contraseña nueva</label>
            <input type="password" id="modPassword">

            <button type="submit">Guardar Cambios</button>
        </form>

        <h3> Libros Prestados</h3>

        <table id="tablaPrestados">
            <thead>
                <tr>
                    <th> Título </th>
                    <th> Autor </th>
                    <th> Fecha de Préstamo </th>
                    <th> Fecha de Devolución </th>
                </tr>
            </thead>

            <tbody id="bodyPrestados"></tbody>
        </table>

        <h3> Reservar Libros</h3>
        <form id="formReserva">
            <input type="text" id="tituloReserva" placeholder="Titulo del Libro" required>
            <button type="submit"> Reservar</button>
        </form>
        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th> Título </th>
                    <th> Estado </th>
                </tr>
            </thead>
            <tbody id="bodyHistorial"></tbody>
        </table>
    </section>
    <script src="usuario.js"></script>
       
    </body>
</html>
